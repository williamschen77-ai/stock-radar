<!doctype html><html lang="zh-TW"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Stock Radar 隱私權政策</title><style>body{max-width:760px;margin:40px auto;padding:0 20px;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC",sans-serif;line-height:1.75;color:#142033}h1{line-height:1.2}a{color:#087ea4}</style><h1>Stock Radar 隱私權政策</h1><p>最後更新：2026 年 7 月 11 日</p><p>Stock Radar 提供公開市場資料與 ETF 研究工具，不要求建立帳號，也不販售個人資料。</p><h2>我們處理的資料</h2><p>網站只會在你的裝置瀏覽器儲存收藏清單等偏好設定（localStorage）。若使用 App 的本機價格提醒，提醒排程只保存在你的裝置。</p><h2>第三方資料來源</h2><p>市場報價與 ETF 持股會向公開資料來源請求。這些服務可能依其自身政策處理連線資訊。</p><h2>聯絡方式</h2><p>如有隱私問題，請透過本專案的公開支援頁面聯絡開發者。</p></html>
